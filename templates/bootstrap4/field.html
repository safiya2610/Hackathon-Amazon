{# Minimal bootstrap4 field template for django-crispy-forms fallback. #}
{% load crispy_forms_tags %}
<div class="form-group">
  {% if field.label %}
    {{ field.label_tag }}
  {% endif %}
  {{ field }}
  {% if field.help_text %}
    <small class="form-text text-muted">{{ field.help_text }}</small>
  {% endif %}
  {% if field.errors %}
    <div class="invalid-feedback d-block">
      {{ field.errors }}
    </div>
  {% endif %}
</div>
